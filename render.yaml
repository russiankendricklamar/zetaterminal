services:
  - type: web
    name: zeta-terminal-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install --no-cache-dir --prefer-binary --only-binary :all: -r requirements.txt || pip install --no-cache-dir --prefer-binary -r requirements.txt
    startCommand: python3 -m uvicorn src.main:app --host 0.0.0.0 --port $PORT
    plan: free
    region: singapore
    branch: main
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: DATABASE_URL
        sync: false
      - key: API_KEY
        sync: false
